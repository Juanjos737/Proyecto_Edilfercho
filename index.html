<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Contacto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0d0f14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108, 99, 255, .18), transparent),
                radial-gradient(ellipse 60% 40% at 90% 100%, rgba(72, 207, 173, .12), transparent);
        }

        .card {
            background: #161a23;
            border: 1px solid #252b38;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6c63ff, #48cfad);
        }

        .badge {
            display: inline-block;
            background: rgba(108, 99, 255, .15);
            border: 1px solid rgba(108, 99, 255, .3);
            color: #6c63ff;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 18px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #e8eaf0;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #7a8099;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #7a8099;
            margin-bottom: 7px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            background: rgba(255, 255, 255, .04);
            border: 1.5px solid #252b38;
            border-radius: 12px;
            padding: 13px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #e8eaf0;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="tel"]::placeholder {
            color: #4a5066;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, .15);
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6c63ff, #8b5cf6);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
        }

        button[type="submit"]:hover {
            opacity: .88;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(108, 99, 255, .35);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            opacity: .55;
            cursor: not-allowed;
        }

        .toast {
            margin-top: 16px;
            padding: 13px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .toast.ok {
            display: block;
            background: rgba(72, 207, 173, .12);
            border: 1px solid rgba(72, 207, 173, .3);
            color: #48cfad;
        }

        .toast.err {
            display: block;
            background: rgba(255, 107, 107, .10);
            border: 1px solid rgba(255, 107, 107, .3);
            color: #ff6b6b;
        }

        .footer-note {
            text-align: center;
            color: #4a5066;
            font-size: 12px;
            margin-top: 24px;
        }

        .footer-note a {
            color: #6c63ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="badge">Proyecto Edilfercho</div>
        <h1>Registro de Contacto</h1>
        <p class="subtitle">Completa el formulario — tus datos se guardan en Supabase.</p>

        <form id="frm">
            <div class="field">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Juan Garcia" autocomplete="name">
            </div>
            <div class="field">
                <label for="email">Correo electronico</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="email">
            </div>
            <div class="field">
                <label for="telefono">Telefono</label>
                <input type="tel" id="telefono" placeholder="+57 300 123 4567" autocomplete="tel">
            </div>
            <button type="submit" id="btn">Enviar registro</button>
            <div class="toast" id="msg"></div>
        </form>

        <p class="footer-note">Datos guardados en <a href="https://supabase.com" target="_blank">Supabase</a></p>
    </div>

    <script>
        var URL_SB = 'https://zqwnacdilpapeynmxivw.supabase.co';
        var KEY_SB = 'sb_publishable_LC-_0zJ2XU7UkithLa_t6g_CtlUqQvq';

        var frm = document.getElementById('frm');
        var btn = document.getElementById('btn');
        var msg = document.getElementById('msg');

        function toast(type, text) {
            msg.className = 'toast ' + type;
            msg.textContent = text;
        }

        frm.onsubmit = function (e) {
            e.preventDefault();

            var nombre = document.getElementById('nombre').value.trim();
            var email = document.getElementById('email').value.trim();
            var telefono = document.getElementById('telefono').value.trim();

            if (!nombre || !email || !telefono) {
                toast('err', 'Completa todos los campos.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Enviando...';
            msg.className = 'toast';

            fetch(URL_SB + '/rest/v1/contactos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': KEY_SB,
                    'Authorization': 'Bearer ' + KEY_SB,
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ nombre: nombre, email: email, telefono: telefono })
            })
                .then(function (res) {
                    if (res.ok) {
                        toast('ok', 'Registro enviado con exito!');
                        frm.reset();
                    } else {
                        return res.text().then(function (t) {
                            toast('err', 'Error ' + res.status + ': ' + t);
                        });
                    }
                })
                .catch(function (err) {
                    toast('err', 'Error de red: ' + err.message);
                })
                .finally(function () {
                    btn.disabled = false;
                    btn.textContent = 'Enviar registro';
                });
        };
    </script>

</body>

</html>
